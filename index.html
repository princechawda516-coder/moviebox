<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Search</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen">

  <div class="max-w-8xl mx-auto px-10 py-10">

    <!-- <h1 class="text-4xl font-bold text-center mb-8">
      🎬 Movie Search
    </h1> -->

    
<header class="mb-10 ">

  

  <div class="text-center mt-12">

    <h2 class="text-4xl md:text-6xl font-bold mb-4">
      Discover Your
      <span class="text-violet-500">
        Favorite Movies
      </span>
    </h2>

    <p class="text-slate-400 max-w-2xl mx-auto">
      Search millions of movies, explore details,
      and find your next favorite film.
    </p>

  </div>

</header>


    <div class="flex gap-3 mb-8">
      <input
        type="text"
        id="searchInput"
        placeholder="Search movie..."
        class="flex-1 px-4 py-3 rounded-xl bg-slate-900 border border-slate-800 outline-none"
      >

      <button
        id="searchBtn"
        class="bg-violet-600 hover:bg-violet-700 px-6 rounded-xl"
      >
        Search
      </button>
    </div>

    <div
      id="moviesContainer"
      class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
    >
    </div>

  </div>

  <script src="moviebox.js"></script>

</body>
</html>
